[pytest]
# --- Environment Configuration ---
# This ensures a fallback exists and the trailing slash prevents navigation errors
base_url = https://demoqa.com

# --- Markers ---
markers =
    smoke: vital navigation and high-level checks
    regression: full feature and UI coverage
    selenium: tests utilizing the Selenium engine
    playwright: tests utilizing the Playwright engine

# --- Console (Live) Logging ---
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s (%(filename)s:%(lineno)s)
log_cli_date_format = %Y-%m-%d %H:%M:%S

# --- Report Logging ---
log_level = INFO
log_format = %(asctime)s [%(levelname)s] %(message)s
log_date_format = %Y-%m-%d %H:%M:%S

# --- Unified Framework Configuration ---
# Execution: Headed mode with 500ms SlowMo for visibility
# URL: Base URL mapped to Playwright built-in 'page' fixture
# Debugging: Trace Viewer captures only on failure to optimize storage
# Reporting: Generates a self-contained HTML dashboard in the 'reports' folder
addopts =
    --headed
    --slowmo 500
    --base-url https://demoqa.com
    --tracing retain-on-failure
    --browser chromium
    --html=reports/dashboard.html
    --self-contained-html
    -v

